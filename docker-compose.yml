services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: newsatlas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env — see .env.example}
      POSTGRES_DB: newsatlas
    volumes:
      - db_data:/var/lib/postgresql/data
    # No host port mapping: only reachable from other containers on this network.
    # If you need a one-off psql session, use `docker compose exec db psql -U newsatlas`
    # rather than publishing this port.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsatlas"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://newsatlas:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@db:5432/newsatlas
    depends_on:
      db:
        condition: service_healthy
    # No host port mapping: only reachable via the Caddy reverse proxy below.

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    depends_on:
      - backend
    # No host port mapping: only reachable via the Caddy reverse proxy below.

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

volumes:
  db_data:
  caddy_data:
  caddy_config:
